name: Dev Pipeline (Raspberry Pi)

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Raspberry Pi
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_KEY }}
          script: |
            set -e

            # Go to project directory
            cd /home/pi/novationcloud.com

            # Pull latest code only (runner owns this)
            git fetch origin
            git checkout dev
            git reset --hard origin/dev

            # Trigger build & PM2 reload as 'pi' user (requires sudoers NOPASSWD)
            sudo -u pi /home/pi/novationcloud.com/deploy.sh
