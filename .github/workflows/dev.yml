name: Dev Pipeline (Raspberry Pi)

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Raspberry Pi
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_KEY }}
          script: |
            set -e

            cd /home/pi/novationcloud.com

            git fetch origin
            git checkout dev
            git pull origin dev

            npm install
