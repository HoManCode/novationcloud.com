name: Dev Pipeline (Raspberry Pi)

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy locally on Raspberry Pi
        shell: bash
        run: |
          set -e
          cd /home/github-runner/novationcloud.com

          git fetch origin
          git checkout dev
          git reset --hard origin/dev

          ./deploy.sh
